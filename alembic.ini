[alembic]
script_location = alembic
sqlalchemy.url = sqlite:///./varsity.db

[post_write_hooks]
# post_write_hooks defines scripts to run after generating
# an SQL script.
# post_write_hooks.type = console_scripts
# post_write_hooks.modules = alembic_post_write_hooks
# post_write_hooks.attributes = post_write_hook

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic
qualname =

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S